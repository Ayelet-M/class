<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Reader · Ethical Vibe Coding</title>
    <link rel="icon" type="image/png" href="assets/T-Neon-Green.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --bg-elev: #0e101a;
            --paper: #f4e4bc;
            --paper-soft: #faf3df;
            --ink: #1a1a1a;
            --ink-soft: #4b4b4b;
            --neon: #00ff41;
            --neon-soft: #00ff4126;
            --rule: rgba(255, 255, 255, 0.08);
            --rule-paper: rgba(0, 0, 0, 0.12);
            --link: #0c7a34;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: var(--bg);
            color: rgba(255, 255, 255, 0.92);
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
        }

        body {
            min-height: 100vh;
            padding: 28px 20px 80px;
            background:
                radial-gradient(1200px 600px at 80% -10%, rgba(0, 255, 65, 0.06), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(0, 255, 65, 0.04), transparent 60%),
                var(--bg);
        }

        .container { max-width: 900px; margin: 0 auto; }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.78);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .brand:hover { color: var(--neon); }
        .brand img { width: 24px; height: 24px; display: block; }
        .brand .term { color: rgba(255, 255, 255, 0.45); font-weight: 500; }

        .top-link {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--neon);
            text-decoration: none;
            border: 1px solid rgba(0, 255, 65, 0.35);
            padding: 6px 12px;
            border-radius: 999px;
            transition: all 0.2s ease;
        }

        .top-link:hover { background: var(--neon-soft); border-color: var(--neon); }

        .card {
            background: var(--paper-soft);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        }

        .header {
            padding: 22px 24px;
            background: var(--bg-elev);
            border-bottom: 1px solid rgba(0, 255, 65, 0.35);
        }

        .title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            color: #fff;
            margin-bottom: 8px;
        }

        .meta {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.8rem;
            color: var(--neon);
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .notice { font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); }
        .notice strong { font-weight: 700; color: rgba(255, 255, 255, 0.8); }
        .notice a { color: var(--neon); text-decoration: underline; }

        .content { padding: 26px 28px; line-height: 1.7; color: var(--ink); }

        .content h1, .content h2, .content h3,
        .content h4, .content h5, .content h6 {
            color: var(--ink);
            letter-spacing: -0.01em;
            margin-top: 26px;
            margin-bottom: 10px;
            line-height: 1.25;
        }
        .content h1 { font-size: 1.7rem; font-weight: 800; }
        .content h2 { font-size: 1.3rem; font-weight: 700; padding-bottom: 6px; border-bottom: 1px solid var(--rule-paper); }
        .content h3 { font-size: 1.08rem; font-weight: 700; }
        .content > *:first-child { margin-top: 0; }

        .content p { margin: 10px 0; }
        .content ul, .content ol { margin: 10px 0 10px 24px; }
        .content li { margin: 6px 0; }

        .content a {
            color: var(--link);
            text-decoration: none;
            border-bottom: 1px solid rgba(12, 122, 52, 0.4);
            transition: all 0.15s ease;
        }
        .content a:hover { border-color: var(--link); background: rgba(0, 255, 65, 0.1); }
        .content strong { color: #111; }

        .content code {
            background: rgba(0, 0, 0, 0.07);
            border: 1px solid var(--rule-paper);
            border-radius: 4px;
            padding: 1px 5px;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.86em;
        }

        .content pre {
            background: var(--bg-elev);
            color: #e6e6e6;
            border: 1px solid rgba(0, 255, 65, 0.18);
            border-radius: 8px;
            padding: 14px;
            overflow-x: auto;
            margin: 14px 0;
        }
        .content pre code { background: transparent; border: 0; color: inherit; padding: 0; }

        .content blockquote {
            border-left: 3px solid var(--neon);
            background: rgba(0, 255, 65, 0.07);
            padding: 10px 14px;
            margin: 14px 0;
            color: var(--ink-soft);
            border-radius: 0 8px 8px 0;
        }
        .content .callout { border-left-width: 4px; }
        .content .callout-label {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #0a6b2e;
            margin-bottom: 4px;
        }

        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.9rem;
        }
        .content th, .content td {
            border: 1px solid var(--rule-paper);
            padding: 8px 10px;
            text-align: left;
            vertical-align: top;
        }
        .content th { background: rgba(0, 0, 0, 0.06); font-weight: 700; }
        .content tr:nth-child(even) td { background: rgba(0, 0, 0, 0.03); }

        .content hr { border: 0; border-top: 1px solid var(--rule-paper); margin: 22px 0; }

        .error {
            color: #7f1d1d;
            background: #fde2e2;
            border: 1px solid #f5b5b5;
            border-radius: 8px;
            padding: 12px;
        }

        .back-link {
            display: inline-block;
            margin-top: 22px;
            color: var(--link);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <a class="brand" href="index.html">
                <img src="assets/T-Neon-Green.png" alt="Cornell T">
                <span>TECHIE 1121 Ethical Vibe Coding <span class="term">· Reader</span></span>
            </a>
            <a class="top-link" href="index.html">← Activities</a>
        </div>
        <div class="card">
            <div class="header">
                <div class="title" id="docTitle">Activity Reader</div>
                <div class="meta" id="projectMeta">Loading…</div>
                <div class="notice" id="roleNotice">This page renders the activity's <strong>instructions.md</strong> file.</div>
            </div>
            <div class="content" id="content"></div>
        </div>
    </div>

    <script>
        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderInline(text) {
            let result = escapeHtml(text);
            result = result.replace(/`([^`]+)`/g, '<code>$1</code>');
            result = result.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            result = result.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            result = result.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            return result;
        }

        const isTableSeparator = (l) => /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)+\|?\s*$/.test(l);
        const splitRow = (l) => l.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());

        function renderMarkdown(markdown) {
            // Drop HTML comments (e.g. sync markers, template guidance) before rendering.
            const lines = markdown.replace(/\r\n/g, '\n').replace(/<!--[\s\S]*?-->/g, '').split('\n');
            const html = [];
            let i = 0;
            let para = [];
            const flushPara = () => {
                if (para.length) { html.push(`<p>${renderInline(para.join(' '))}</p>`); para = []; }
            };

            while (i < lines.length) {
                const line = lines[i];

                // fenced code block
                if (line.startsWith('```')) {
                    flushPara();
                    const buf = [];
                    i++;
                    while (i < lines.length && !lines[i].startsWith('```')) { buf.push(escapeHtml(lines[i])); i++; }
                    i++; // skip closing fence
                    html.push(`<pre><code>${buf.join('\n')}</code></pre>`);
                    continue;
                }

                if (!line.trim()) { flushPara(); i++; continue; }

                const heading = line.match(/^(#{1,6})\s+(.*)$/);
                if (heading) {
                    flushPara();
                    const level = heading[1].length;
                    html.push(`<h${level}>${renderInline(heading[2].trim())}</h${level}>`);
                    i++;
                    continue;
                }

                // thematic break (--- / *** / ___), never a table separator (those have pipes)
                if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
                    flushPara();
                    html.push('<hr>');
                    i++;
                    continue;
                }

                // GFM table: header row followed by a separator row
                if (line.includes('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1])) {
                    flushPara();
                    const headers = splitRow(line);
                    i += 2;
                    const rows = [];
                    while (i < lines.length && lines[i].trim() && lines[i].includes('|')) { rows.push(splitRow(lines[i])); i++; }
                    let t = '<table><thead><tr>' + headers.map(c => `<th>${renderInline(c)}</th>`).join('') + '</tr></thead><tbody>';
                    for (const r of rows) t += '<tr>' + r.map(c => `<td>${renderInline(c)}</td>`).join('') + '</tr>';
                    t += '</tbody></table>';
                    html.push(t);
                    continue;
                }

                // blockquote (merge consecutive lines; support > [!TYPE] callouts)
                if (/^>\s?/.test(line)) {
                    flushPara();
                    const buf = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^>\s?/, '')); i++; }
                    let cls = 'blockquote';
                    let label = '';
                    const m = buf[0] && buf[0].match(/^\[!(\w+)\]\s*(.*)$/);
                    if (m) { cls = 'callout callout-' + m[1].toLowerCase(); label = `<div class="callout-label">${escapeHtml(m[1])}</div>`; buf[0] = m[2]; }
                    const inner = buf.filter(x => x.length).map(x => renderInline(x)).join('<br>');
                    html.push(`<blockquote class="${cls}">${label}${inner}</blockquote>`);
                    continue;
                }

                // unordered list
                if (/^[-*]\s+/.test(line)) {
                    flushPara();
                    html.push('<ul>');
                    while (i < lines.length && /^[-*]\s+/.test(lines[i])) { html.push(`<li>${renderInline(lines[i].replace(/^[-*]\s+/, ''))}</li>`); i++; }
                    html.push('</ul>');
                    continue;
                }

                // ordered list
                if (/^\d+\.\s+/.test(line)) {
                    flushPara();
                    html.push('<ol>');
                    while (i < lines.length && /^\d+\.\s+/.test(lines[i])) { html.push(`<li>${renderInline(lines[i].replace(/^\d+\.\s+/, ''))}</li>`); i++; }
                    html.push('</ol>');
                    continue;
                }

                para.push(line.trim());
                i++;
            }

            flushPara();
            return html.join('\n');
        }

        const DOC_PROFILES = {
            instructions: {
                title: 'Activity Instructions',
                notice: "This page renders the activity's <strong>instructions.md</strong> file.",
                paths: (week, project) => [`./${week}/${project}/instructions.md`],
            },
            reflection: {
                title: 'Reflection (Vibe Report)',
                notice: "This page renders the student's <strong>vibe-report.md</strong> reflection. If the student hasn't started one yet, the activity template is shown instead.",
                paths: (week, project) => [
                    `./${week}/${project}/vibe-report.md`,
                    `./${week}/${project}/vibe-report-template.md`,
                    `./vibe-report-template.md`,
                ],
            },
        };

        async function fetchFirstAvailable(paths) {
            for (const path of paths) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        return { path, markdown: await response.text() };
                    }
                } catch (_) {
                    // try next
                }
            }
            throw new Error(`Could not load any of: ${paths.join(', ')}`);
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const week = params.get('week');
            const project = params.get('project');
            const file = params.get('file');
            const docKey = params.get('doc') || 'instructions';
            const profile = DOC_PROFILES[docKey] || DOC_PROFILES.instructions;

            const content = document.getElementById('content');
            const meta = document.getElementById('projectMeta');
            const titleEl = document.getElementById('docTitle');
            const noticeEl = document.getElementById('roleNotice');

            // Generic mode: render any markdown file passed via ?file=path (&title=...)
            if (file) {
                const safeFile = file.replace(/^\/+/, '').replace(/\.\.(\/|\\)/g, '');
                const pageTitle = params.get('title') || safeFile.split('/').pop();
                titleEl.textContent = pageTitle;
                noticeEl.innerHTML = `This page renders <strong>${escapeHtml(safeFile)}</strong>.`;
                document.title = `${pageTitle} — Vibe Coding`;
                meta.textContent = safeFile;
                try {
                    const { markdown } = await fetchFirstAvailable([`./${safeFile}`]);
                    content.innerHTML = `${renderMarkdown(markdown)}<a class="back-link" href="./index.html">← Back to activities</a>`;
                } catch (error) {
                    content.innerHTML = `<div class="error">${escapeHtml(error.message)}</div><a class="back-link" href="./index.html">← Back to activities</a>`;
                }
                return;
            }

            titleEl.textContent = profile.title;
            noticeEl.innerHTML = profile.notice;
            document.title = `${profile.title} — Vibe Coding`;

            if (!week || !project) {
                meta.textContent = 'Unknown activity';
                content.innerHTML = '<div class="error">Missing query parameters. Expected <code>?week=week1&project=7_13</code>.</div><a class="back-link" href="./index.html">← Back to activities</a>';
                return;
            }

            meta.textContent = `${week}/${project}`;

            try {
                const { path, markdown } = await fetchFirstAvailable(profile.paths(week, project));
                meta.textContent = `${week}/${project} — ${path.replace(/^\.\//, '')}`;
                content.innerHTML = `${renderMarkdown(markdown)}<a class="back-link" href="./index.html">← Back to activities</a>`;
            } catch (error) {
                content.innerHTML = `<div class="error">${escapeHtml(error.message)}</div><a class="back-link" href="./index.html">← Back to activities</a>`;
            }
        }

        init();
    </script>
</body>
</html>
