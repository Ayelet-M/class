name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build React apps (auto-detect) and prepare folders
        run: |
          set -e
          
          # Function to process a directory
          process_directory() {
            local folder="$1"
            echo "Processing $folder"
            if [ -f "$folder/package.json" ]; then
              # Check if it's a React project
              if grep -q '"react"' "$folder/package.json" || grep -q '"react-scripts"' "$folder/package.json" || grep -q '"vite"' "$folder/package.json"; then
                echo "Detected React/Vite app in $folder"
                pushd "$folder"
                npm ci || npm install
                
                # Determine build tool and set PUBLIC_URL accordingly
                if grep -q '"vite"' "$folder/package.json"; then
                  echo "Building with Vite"
                  npm run build
                  BUILD_OUTPUT="dist"
                else
                  echo "Building with React Scripts"
                  # PUBLIC_URL=. means assets load from current directory
                  PUBLIC_URL=. npm run build
                  BUILD_OUTPUT="build"
                fi
                
                # Copy build output to folder root
                rm -rf index.html *.js *.css *.map asset-manifest.json || true
                if [ -d "$BUILD_OUTPUT" ]; then
                  cp -r "$BUILD_OUTPUT"/* .
                  rm -rf "$BUILD_OUTPUT"
                fi
                popd
              else
                echo "package.json present but not React/Vite; leaving static files as-is in $folder"
              fi
            else
              echo "Static site detected (no package.json) in $folder; no build needed"
            fi
          }
          
          # Process ALL code_deliverable directories (includes examples recursively)
          echo "=== Processing all code_deliverable directories ==="
          while IFS= read -r -d '' folder; do
            process_directory "$folder"
          done < <(find . -type d -path '*/code_deliverable' -print0)

          # Generate examples manifest for GitHub Pages (which doesn't support directory listings)
          echo "=== Generating examples manifest ==="
          cat > examples-manifest.json << 'MANIFEST_EOF'
[
  {
    "week": "week1",
    "folder": "7_13",
    "examples": [
      {
        "folder": "activity1_3d-example",
        "name": "3D Activity Example",
        "nested": true
      },
      {
        "folder": "activity1_example2",
        "name": "Example 2",
        "nested": true
      }
    ]
  },
  {
    "week": "week1",
    "folder": "7_14",
    "examples": [
      {
        "folder": "code_deliverable",
        "name": "Example",
        "nested": false
      }
    ]
  },
  {
    "week": "week1",
    "folder": "7_15_16",
    "examples": [
      {
        "folder": "code_deliverable",
        "name": "Example",
        "nested": false
      }
    ]
  },
  {
    "week": "week2",
    "folder": "7_20",
    "examples": [
      {
        "folder": "code_deliverable",
        "name": "Example",
        "nested": false
      }
    ]
  },
  {
    "week": "week2",
    "folder": "7_21",
    "examples": [
      {
        "folder": "code_deliverable",
        "name": "Example",
        "nested": false
      }
    ]
  },
  {
    "week": "week2",
    "folder": "7_22_23",
    "examples": [
      {
        "folder": "code_deliverable",
        "name": "Example",
        "nested": false
      }
    ]
  },
  {
    "week": "week3",
    "folder": "7_27",
    "examples": [
      {
        "folder": "code_deliverable",
        "name": "Example",
        "nested": false
      }
    ]
  },
  {
    "week": "week3",
    "folder": "7_28_30",
    "examples": [
      {
        "folder": "code_deliverable",
        "name": "Example",
        "nested": false
      }
    ]
  }
]
MANIFEST_EOF
          echo "✓ Manifest generated"
          
          echo "=== Verifying built files ==="
          ls -la week1/7_14/code_deliverable/ | head -10 || echo "7_14 not built yet"
          ls -la week1/7_13/examples/activity1_3d-example/code_deliverable/ | head -10 || echo "3d-example not built yet"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
