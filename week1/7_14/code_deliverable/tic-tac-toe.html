<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --panel: #f7efe2;
      --ink: #1f2330;
      --ink-soft: #5d6070;
      --accent: #7a4b2a;
      --accent-2: #2b5d4f;
      --line: #1d2430;
      --shadow: rgba(0, 0, 0, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 28%),
        linear-gradient(135deg, #11151f 0%, #1b2230 100%);
      color: var(--panel);
    }

    .game-card {
      width: min(92vw, 480px);
      background: linear-gradient(145deg, #f7efe2 0%, #efe1c7 100%);
      color: var(--ink);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 40px var(--shadow);
      border: 2px solid rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 22px;
      text-align: center;
      color: var(--ink-soft);
      line-height: 1.5;
    }

    .status {
      margin-bottom: 18px;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      min-height: 1.4em;
      color: var(--accent);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      background: var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.2);
      border: 2px solid rgba(0,0,0,0.14);
    }

    .cell {
      aspect-ratio: 1;
      border: 0;
      background: var(--panel);
      font-size: clamp(2.2rem, 8vw, 3.6rem);
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
      position: relative;
    }

    .cell:hover {
      background: #fdf7eb;
      transform: translateY(-1px);
    }

    .cell:focus-visible {
      outline: 3px solid var(--accent-2);
      outline-offset: -3px;
    }

    .cell:not(:last-child) {
      border-right: 2px solid var(--line);
    }

    .cell:nth-child(n + 4):nth-child(-n + 6) {
      border-top: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
    }

    .cell:nth-child(7),
    .cell:nth-child(8),
    .cell:nth-child(9) {
      border-top: 2px solid var(--line);
    }

    .cell.winner {
      background: #e9d8b8;
      color: var(--accent-2);
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 22px;
    }

    button.restart {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.16);
      transition: transform 0.15s ease;
    }

    button.restart:hover {
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .game-card { padding: 20px; }
      .cell { font-size: 2.6rem; }
    }
  </style>
</head>
<body>
  <main class="game-card">
    <h1>Tic-Tac-Toe</h1>
    <p class="subtitle">Two players. Three in a row wins.</p>
    <div class="status" id="status">Player X starts.</div>
    <div class="board" id="board" role="grid" aria-label="Tic-tac-toe board">
      <button class="cell" data-index="0" aria-label="Cell 1"></button>
      <button class="cell" data-index="1" aria-label="Cell 2"></button>
      <button class="cell" data-index="2" aria-label="Cell 3"></button>
      <button class="cell" data-index="3" aria-label="Cell 4"></button>
      <button class="cell" data-index="4" aria-label="Cell 5"></button>
      <button class="cell" data-index="5" aria-label="Cell 6"></button>
      <button class="cell" data-index="6" aria-label="Cell 7"></button>
      <button class="cell" data-index="7" aria-label="Cell 8"></button>
      <button class="cell" data-index="8" aria-label="Cell 9"></button>
    </div>
    <div class="actions">
      <button class="restart" id="restart">Restart Game</button>
    </div>
  </main>

  <script>
    const cells = Array.from(document.querySelectorAll('.cell'));
    const status = document.getElementById('status');
    const restartButton = document.getElementById('restart');

    let board = Array(9).fill('');
    let currentPlayer = 'X';
    let gameActive = true;

    const winLines = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    function updateStatus(message) {
      status.textContent = message;
    }

    function endGame(winner) {
      gameActive = false;
      if (winner === 'draw') {
        updateStatus('It is a draw.');
      } else {
        updateStatus(`Player ${winner} wins!`);
      }
    }

    function checkWinner() {
      for (const [a, b, c] of winLines) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          cells[a].classList.add('winner');
          cells[b].classList.add('winner');
          cells[c].classList.add('winner');
          endGame(board[a]);
          return true;
        }
      }

      if (board.every(Boolean)) {
        endGame('draw');
        return true;
      }

      return false;
    }

    function handleMove(index) {
      if (!gameActive || board[index]) return;

      board[index] = currentPlayer;
      cells[index].textContent = currentPlayer;
      cells[index].disabled = true;

      if (checkWinner()) return;

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateStatus(`Player ${currentPlayer}'s turn`);
    }

    cells.forEach((cell) => {
      cell.addEventListener('click', () => {
        handleMove(Number(cell.dataset.index));
      });
    });

    restartButton.addEventListener('click', () => {
      board = Array(9).fill('');
      currentPlayer = 'X';
      gameActive = true;
      cells.forEach((cell) => {
        cell.textContent = '';
        cell.disabled = false;
        cell.classList.remove('winner');
      });
      updateStatus("Player X starts.");
    });
  </script>
</body>
</html>
