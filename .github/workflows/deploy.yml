name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React apps (auto-detect) and prepare folders
        run: |
          set -e

          # Function to process a directory
          process_directory() {
            local folder="$1"
            echo "Processing $folder"
            echo "Listing $folder:"
            ls -la "$folder"

            if [ -f "$folder/package.json" ]; then
              # Check if it's a React project
              if grep -q '"react"' "$folder/package.json" || grep -q '"react-scripts"' "$folder/package.json" || grep -q '"vite"' "$folder/package.json"; then
                echo "Detected React/Vite app in $folder"
                pushd "$folder"
                
                # Install dependencies
                if [ -f "package-lock.json" ]; then
                  npm ci --legacy-peer-deps || npm install --legacy-peer-deps
                else
                  npm install --legacy-peer-deps
                fi

                # Determine build tool and set PUBLIC_URL accordingly
                local build_dir=""
                if grep -q '"vite"' "package.json"; then
                  echo "Building with Vite"
                  npm run build -- --base=./
                  if [ -d "dist" ]; then
                    build_dir="dist"
                  elif [ -d "build" ]; then
                    build_dir="build"
                  else
                    echo "ERROR: No Vite build output found in dist/ or build/"
                    ls -la
                  fi
                else
                  echo "Building with React Scripts"
                  # PUBLIC_URL=. means assets load from current directory
                  PUBLIC_URL=. npm run build
                  build_dir="build"
                fi

                # Copy build output to folder root
                if [ -n "$build_dir" ] && [ -d "$build_dir" ]; then
                  echo "Deploying build artifact from $build_dir to root"
                  ls -la "$build_dir"
                  
                  # Remove existing assets to prevent conflicts
                  rm -rf index.html *.js *.css *.map asset-manifest.json || true
                  
                  # Copy new assets
                  cp -r "$build_dir"/* .
                  rm -rf "$build_dir"
                  
                  echo "Deployment complete for $folder. Content of root:"
                  ls -la .
                else
                  echo "WARNING: Build directory '$build_dir' missing. Skipping deployment for $folder."
                fi
                popd
              else
                echo "package.json present but not React/Vite; leaving static files as-is in $folder"
              fi
            else
              echo "Static site detected (no package.json) in $folder; no build needed"
            fi
          }

          # Process ALL code_deliverable directories (includes examples recursively)
          echo "=== Processing all code_deliverable directories ==="
          while IFS= read -r -d '' folder; do
            process_directory "$folder"
          done < <(find . -type d -path '*/code_deliverable' -print0)

          # Generate examples manifest for GitHub Pages (which doesn't support directory listings)
          echo "=== Generating examples manifest ==="

          python3 scripts/generate_manifest.py
          echo "✓ Generated examples-manifest.json"

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
