name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build React apps (auto-detect) and prepare folders
        run: |
          set -e
          
          # Function to process a directory
          process_directory() {
            local folder="$1"
            echo "Processing $folder"
            if [ -f "$folder/package.json" ]; then
              # Check if it's a React project
              if grep -q '"react"' "$folder/package.json" || grep -q '"react-scripts"' "$folder/package.json" || grep -q '"vite"' "$folder/package.json"; then
                echo "Detected React/Vite app in $folder"
                pushd "$folder"
                npm ci || npm install
                
                # Determine build tool and set PUBLIC_URL accordingly
                if grep -q '"vite"' "$folder/package.json"; then
                  echo "Building with Vite"
                  npm run build
                  BUILD_OUTPUT="dist"
                else
                  echo "Building with React Scripts"
                  # PUBLIC_URL=. means assets load from current directory
                  PUBLIC_URL=. npm run build
                  BUILD_OUTPUT="build"
                fi
                
                # Copy build output to folder root
                rm -rf index.html *.js *.css *.map asset-manifest.json || true
                if [ -d "$BUILD_OUTPUT" ]; then
                  cp -r "$BUILD_OUTPUT"/* .
                  rm -rf "$BUILD_OUTPUT"
                fi
                popd
              else
                echo "package.json present but not React/Vite; leaving static files as-is in $folder"
              fi
            else
              echo "Static site detected (no package.json) in $folder; no build needed"
            fi
          }
          
          # Process ALL code_deliverable directories (includes examples recursively)
          echo "=== Processing all code_deliverable directories ==="
          while IFS= read -r -d '' folder; do
            process_directory "$folder"
          done < <(find . -type d -path '*/code_deliverable' -print0)

          # Generate examples manifest for GitHub Pages (which doesn't support directory listings)
          echo "=== Generating examples manifest ==="
          
          # Build JSON using bash - collect all examples
          MANIFEST="["
          FIRST_ENTRY=true
          
          # Find all week folders
          for WEEK_DIR in week*; do
            for DATE_DIR in "$WEEK_DIR"/*/ ; do
              if [ -d "$DATE_DIR/examples" ]; then
                DATE_NAME=$(basename "$DATE_DIR")
                
                if [ "$FIRST_ENTRY" = false ]; then
                  MANIFEST+=","
                fi
                
                MANIFEST+="
    {
      \"week\": \"$WEEK_DIR\",
      \"folder\": \"$DATE_NAME\",
      \"examples\": ["
                
                FIRST_EXAMPLE=true
                
                # Check for nested examples (activity*/code_deliverable)
                if [ -d "$DATE_DIR/examples" ] && [ "$(find "$DATE_DIR/examples" -maxdepth 1 -type d | wc -l)" -gt 1 ]; then
                  for ACTIVITY_DIR in "$DATE_DIR/examples"/*/; do
                    if [ -f "$ACTIVITY_DIR/code_deliverable/index.html" ]; then
                      ACTIVITY_NAME=$(basename "$ACTIVITY_DIR")
                      if [ "$FIRST_EXAMPLE" = false ]; then
                        MANIFEST+=","
                      fi
                      MANIFEST+="
        {
          \"folder\": \"$ACTIVITY_NAME\",
          \"name\": \"$ACTIVITY_NAME\",
          \"nested\": true
        }"
                      FIRST_EXAMPLE=false
                    fi
                  done
                fi
                
                # Check for direct examples (examples/code_deliverable)
                if [ -f "$DATE_DIR/examples/code_deliverable/index.html" ]; then
                  if [ "$FIRST_EXAMPLE" = false ]; then
                    MANIFEST+=","
                  fi
                  MANIFEST+="
        {
          \"folder\": \"code_deliverable\",
          \"name\": \"Example\",
          \"nested\": false
        }"
                  FIRST_EXAMPLE=false
                fi
                
                MANIFEST+="
      ]
    }"
                FIRST_ENTRY=false
              fi
            done
          done
          
          MANIFEST+="]"
          echo "$MANIFEST" > examples-manifest.json
          echo "✓ Manifest generated"
          cat examples-manifest.json
          ls -la week1/7_14/code_deliverable || true
          
          echo "Listing 7_13 examples 3d-example contents after build:"
          ls -la week1/7_13/examples/activity1_3d-example/code_deliverable || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
