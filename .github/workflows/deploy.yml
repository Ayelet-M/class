name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build React apps (auto-detect) and prepare folders
        run: |
          set -e
          
          # Function to process a directory
          process_directory() {
            local folder="$1"
            echo "Processing $folder"
            if [ -f "$folder/package.json" ]; then
              # Check if it's a React project
              if grep -q '"react"' "$folder/package.json" || grep -q '"react-scripts"' "$folder/package.json" || grep -q '"vite"' "$folder/package.json"; then
                echo "Detected React/Vite app in $folder"
                pushd "$folder"
                npm ci || npm install
                
                # Determine build tool and set PUBLIC_URL accordingly
                if grep -q '"vite"' "$folder/package.json"; then
                  echo "Building with Vite"
                  npm run build
                  BUILD_OUTPUT="dist"
                else
                  echo "Building with React Scripts"
                  # PUBLIC_URL=. means assets load from current directory
                  PUBLIC_URL=. npm run build
                  BUILD_OUTPUT="build"
                fi
                
                # Copy build output to folder root
                rm -rf index.html *.js *.css *.map asset-manifest.json || true
                if [ -d "$BUILD_OUTPUT" ]; then
                  cp -r "$BUILD_OUTPUT"/* .
                  rm -rf "$BUILD_OUTPUT"
                fi
                popd
              else
                echo "package.json present but not React/Vite; leaving static files as-is in $folder"
              fi
            else
              echo "Static site detected (no package.json) in $folder; no build needed"
            fi
          }
          
          # Process ALL code_deliverable directories (includes examples recursively)
          echo "=== Processing all code_deliverable directories ==="
          while IFS= read -r -d '' folder; do
            process_directory "$folder"
          done < <(find . -type d -path '*/code_deliverable' -print0)

          # Generate examples manifest for GitHub Pages (which doesn't support directory listings)
          echo "=== Generating examples manifest ==="
          
          # Create Python script to generate manifest
          cat > /tmp/generate_manifest.py << 'PYTHON_EOF'
import json
import os
from pathlib import Path

manifest = []

# Find all week directories
for week_dir in sorted(Path('.').glob('week*')):
    if not week_dir.is_dir():
        continue
    
    week_name = week_dir.name
    
    # Find all date subdirectories
    for date_dir in sorted(week_dir.glob('*/')):
        if not date_dir.is_dir():
            continue
        
        date_name = date_dir.name
        examples = []
        
        examples_dir = date_dir / 'examples'
        if examples_dir.exists():
            # Check for nested examples (activity*/code_deliverable)
            for activity_dir in sorted(examples_dir.glob('*/')):
                if activity_dir.is_dir():
                    activity_name = activity_dir.name
                    if activity_name == 'code_deliverable':
                        continue  # Skip, this is direct structure
                    
                    if (activity_dir / 'code_deliverable' / 'index.html').exists():
                        examples.append({
                            "folder": activity_name,
                            "name": activity_name,
                            "nested": True
                        })
            
            # Check for direct examples (examples/code_deliverable)
            if (examples_dir / 'code_deliverable' / 'index.html').exists():
                examples.append({
                    "folder": "code_deliverable",
                    "name": "Example",
                    "nested": False
                })
        
        entry = {
            "week": week_name,
            "folder": date_name,
            "examples": examples
        }
        manifest.append(entry)

# Write manifest
with open('examples-manifest.json', 'w') as f:
    json.dump(manifest, f, indent=2)

print("✓ Manifest generated with entries:")
for entry in manifest:
    print(f"  - {entry['week']}/{entry['folder']}: {len(entry['examples'])} examples")
PYTHON_EOF
          python3 /tmp/generate_manifest.py
          echo "✓ Generated examples-manifest.json"
          cat examples-manifest.json

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
