<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>To-Do List</h1>
      <p class="subtitle">Keep your tasks organized and easy to manage.</p>

      <form id="todo-form" class="todo-form">
        <input
          id="todo-input"
          type="text"
          placeholder="Add a new task..."
          maxlength="80"
          required
        />
        <button type="submit">Add</button>
      </form>

      <div class="toolbar">
        <div class="filters" role="tablist" aria-label="Task filters">
          <button class="filter active" data-filter="all" type="button">All</button>
          <button class="filter" data-filter="active" type="button">Active</button>
          <button class="filter" data-filter="completed" type="button">Completed</button>
        </div>
        <div id="task-count" class="task-count">0 tasks left</div>
      </div>

      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
    </main>

    <script src="app.js"></script>
  </body>
</html>
