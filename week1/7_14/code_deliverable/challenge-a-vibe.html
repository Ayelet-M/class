<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rainy Coffee Pomodoro</title>
  <style>
    :root {
      --cream: #f7efe8;
      --sage: #b8c8b1;
      --rose: #d8a8a0;
      --tea: #6f5a4a;
      --ink: #4a3b33;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(247,239,232,0.95), rgba(232,216,204,0.9)),
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><g fill="none" stroke="rgba(111,90,74,0.12)" stroke-width="1"><path d="M0 80 C20 60, 40 80, 60 60 S100 40, 120 60"/><path d="M0 100 C20 80, 40 100, 60 80 S100 60, 120 80"/></g></svg>');
      background-size: cover;
      padding: 24px;
    }

    .timer-card {
      width: min(420px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 250, 245, 0.9);
      box-shadow: 0 18px 45px rgba(87, 60, 46, 0.16);
      border: 1px solid rgba(111, 90, 74, 0.12);
      text-align: center;
    }

    .label {
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 10px;
      font-weight: 700;
    }

    h1 {
      font-size: 2rem;
      margin: 0 0 8px;
      color: var(--tea);
    }

    .subtitle {
      margin: 0 0 18px;
      color: #7a6557;
      font-size: 0.98rem;
    }

    .display {
      font-size: 4.6rem;
      font-weight: 700;
      margin: 18px 0 22px;
      color: var(--ink);
      letter-spacing: 0.04em;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--rose), #c47d77);
      box-shadow: 0 8px 18px rgba(212, 141, 130, 0.24);
    }

    button.secondary {
      background: linear-gradient(135deg, var(--sage), #96ab89);
      box-shadow: 0 8px 18px rgba(139, 163, 130, 0.22);
    }

    .status {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #7d675a;
    }
  </style>
</head>
<body>
  <div class="timer-card">
    <div class="label">Rainy Coffee Shop</div>
    <h1>Pomodoro Timer</h1>
    <p class="subtitle">Soft light, steady focus, and a little steam.</p>
    <div class="display" id="time">25:00</div>
    <div class="buttons">
      <button id="start">Start</button>
      <button id="reset" class="secondary">Reset</button>
    </div>
    <div class="status" id="status">Ready to breathe in and focus.</div>
  </div>

  <script>
    let minutes = 25;
    let seconds = 0;
    let timer;
    let isRunning = false;

    const display = document.getElementById('time');
    const status = document.getElementById('status');

    function updateDisplay() {
      const m = String(minutes).padStart(2, '0');
      const s = String(seconds).padStart(2, '0');
      display.textContent = `${m}:${s}`;
    }

    function tick() {
      if (seconds === 0) {
        if (minutes === 0) {
          clearInterval(timer);
          isRunning = false;
          status.textContent = 'Break time. Sip slowly and reset.';
          return;
        }
        minutes--;
        seconds = 59;
      } else {
        seconds--;
      }
      updateDisplay();
    }

    document.getElementById('start').addEventListener('click', () => {
      if (isRunning) return;
      isRunning = true;
      status.textContent = 'Soft focus mode activated.';
      timer = setInterval(tick, 1000);
    });

    document.getElementById('reset').addEventListener('click', () => {
      clearInterval(timer);
      isRunning = false;
      minutes = 25;
      seconds = 0;
      updateDisplay();
      status.textContent = 'Ready to breathe in and focus.';
    });

    updateDisplay();
  </script>
</body>
</html>
