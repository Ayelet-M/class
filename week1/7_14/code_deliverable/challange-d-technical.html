<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Login</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2b0d4f, #6f3cff 55%, #9d7bff);
      color: #fff;
    }

    .login-card {
      width: min(90vw, 380px);
      padding: 32px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(12px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      text-align: center;
    }

    p {
      margin: 0 0 20px;
      text-align: center;
      color: #f3eaff;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input {
      padding: 12px 14px;
      border: none;
      border-radius: 20px;
      outline: none;
      background: rgba(255, 255, 255, 0.95);
      color: #3b2068;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(90deg, #7b4cff, #a96dff);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Game Login</h1>
    <p>Enter your hero credentials to continue.</p>
    <form>
      <input type="text" placeholder="Username" />
      <input type="password" placeholder="Password" />
      <button type="submit">Start Quest</button>
    </form>
  </div>
</body>
</html>
