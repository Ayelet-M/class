<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Submissions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 50px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .weeks {
            display: grid;
            gap: 30px;
        }

        .week {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .examples-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid rgba(102, 126, 234, 0.35);
            background: transparent;
            color: rgba(102, 126, 234, 0.9);
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .examples-toggle:hover {
            background: rgba(102, 126, 234, 0.12);
            border-color: rgba(102, 126, 234, 0.7);
        }

        .examples-toggle .arrow {
            display: inline-block;
            font-size: 11px;
            transition: transform 0.2s ease;
        }

        .examples-toggle.is-open .arrow {
            transform: rotate(180deg);
        }

        .assignment:hover .examples-toggle {
            color: rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .week-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .assignments {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            align-items: start;
        }

        .assignment-group {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .assignment {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            background: #f7f7f7;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            transition: all 0.25s ease;
            border: 1px solid #e6e6e6;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            cursor: pointer;
        }

        .assignment:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(102, 126, 234, 0.3);
        }

        .date {
            font-size: 1.1em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 6px;
            transition: color 0.25s ease;
        }

        .assignment:hover .date {
            color: white;
        }

        .view-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2px;
            font-size: 0.9em;
            transition: color 0.25s ease;
            cursor: pointer;
        }

        .submission-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .examples-hint {
            font-size: 0.75em;
            color: rgba(102, 126, 234, 0.8);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .assignment:hover .examples-hint {
            color: rgba(255, 255, 255, 0.85);
        }

        .toggle-examples {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            border: 1px solid #667eea;
            background: transparent;
            color: #667eea;
            font-size: 12px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle-examples:hover {
            background: #667eea;
            color: white;
        }

        .toggle-examples.is-open {
            transform: rotate(180deg);
        }

        .assignment:hover .view-link {
            color: white;
        }

        .examples-section {
            width: 100%;
            margin-top: 0;
            padding: 12px 16px;
            background: #f9f9f9;
            border-radius: 0 0 8px 8px;
            border: 1px solid #e6e6e6;
            border-top: 0;
        }

        .assignment-group.examples-open .assignment {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom: 0;
        }

        .assignment-group.examples-open .examples-section {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }

        .examples-section:empty {
            display: none;
        }

        .examples-title {
            font-size: 0.7em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.7;
        }

        .examples-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .example-link-btn {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85em;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid #667eea;
            border-radius: 6px;
            transition: all 0.2s ease;
            text-align: center;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .example-link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: left 0.25s ease;
            z-index: -1;
            border-radius: 6px;
        }

        .example-link-btn:hover {
            color: white;
            border-color: transparent;
            box-shadow: 0 6px 14px rgba(102, 126, 234, 0.25);
            transform: translateY(-1px);
        }

        .examples-collapsed {
            display: none;
        }

        .example-link-btn:hover::before {
            left: 0;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-top: 60px;
        }

        footer p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="studentName">Student Submissions</h1>
        <div class="weeks" id="weeksContainer"></div>
    </div>

    <footer>
        <p>Cornell Tech Vibe Coding Summer 2026</p>
    </footer>

    <script>
        async function loadStudentName() {
            try {
                const response = await fetch('./package.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const packageJson = await response.json();
                const name = packageJson.name;
                console.log('Loaded name:', name);
                document.getElementById('studentName').textContent = `${name}'s Submissions`;
            } catch (error) {
                console.error('Failed to load student name:', error);
            }
        }

        const submissions = {
            'Week 1': ['7_13', '7_14', '7_15_16'],
            'Week 2': ['7_20', '7_21', '7_22_23'],
            'Week 3': ['7_27', '7_28_30']
        };

        const dateMap = {
            '7_13': 'July 13th',
            '7_14': 'July 14th',
            '7_15_16': 'July 15-16',
            '7_20': 'July 20th',
            '7_21': 'July 21st',
            '7_22_23': 'July 22-23',
            '7_27': 'July 27th',
            '7_28_30': 'July 28-30'
        };

        async function loadExamples(weekFolder, folder) {
            console.log(`🔍 Attempting to load examples for ${weekFolder}/${folder}`);
            try {
                // Load the manifest
                const manifestResponse = await fetch('./examples-manifest.json');
                if (!manifestResponse.ok) {
                    console.warn('⚠️ Could not load examples manifest');
                    return [];
                }
                
                const manifest = await manifestResponse.json();
                console.log(`  → Loaded manifest with ${manifest.length} entries`);
                
                // Find entry for this week/folder
                const entry = manifest.find(m => m.week === weekFolder && m.folder === folder);
                if (!entry || !entry.examples || entry.examples.length === 0) {
                    console.log(`  → No examples found in manifest for ${weekFolder}/${folder}`);
                    return [];
                }
                
                console.log(`  → Found ${entry.examples.length} examples in manifest`);
                
                // Load each example
                const examples = await Promise.all(entry.examples.map(async (example) => {
                    let basePath;
                    
                    if (example.path) {
                        basePath = example.path;
                    } else {
                        // Fallback for older logic
                        if (example.nested && example.folder !== 'code_deliverable') {
                            basePath = `${weekFolder}/${folder}/examples/${example.folder}/code_deliverable/`;
                        } else {
                            basePath = `${weekFolder}/${folder}/examples/code_deliverable/`;
                        }
                    }
                    
                    console.log(`    → Checking: ${basePath} (Nested: ${example.nested}, Folder: ${example.folder})`);
                    
                    try {
                        const indexResponse = await fetch(`${basePath}index.html`);
                        if (indexResponse.ok) {
                            console.log(`      ✓ Found index.html`);
                            return {
                                path: basePath,
                                name: example.name || example.folder
                            };
                        }
                    } catch (e) {
                        console.log(`      ✗ Fetch failed: ${e.message}`);
                    }
                    
                    return null;
                }));
                
                const validExamples = examples.filter(e => e !== null);
                console.log(`  ✓ Loaded ${validExamples.length} valid examples`);
                return validExamples;
            } catch (error) {
                console.error(`✗ Error loading examples for ${weekFolder}/${folder}:`, error);
                return [];
            }
        }

        async function tryLoadExample(basePath) {
            console.log(`    → Trying: ${basePath}`);
            try {
                const packageResponse = await fetch(`${basePath}package.json`);
                if (packageResponse.ok) {
                    const packageJson = await packageResponse.json();
                    console.log(`      ✓ Found package.json, name: ${packageJson.name}`);
                    return [{
                        path: basePath,
                        name: packageJson.name || 'Example'
                    }];
                }
            } catch (e) {
                console.log(`      ✗ package.json fetch failed: ${e.message}`);
            }

            try {
                const indexResponse = await fetch(`${basePath}index.html`);
                if (indexResponse.ok) {
                    const indexText = await indexResponse.text();
                    const parser = new DOMParser();
                    const indexDoc = parser.parseFromString(indexText, 'text/html');
                    const title = indexDoc.querySelector('title')?.textContent?.trim();
                    console.log(`      ✓ Found index.html, title: ${title}`);
                    return [{
                        path: basePath,
                        name: title || 'Example'
                    }];
                }
            } catch (e) {
                console.log(`      ✗ index.html fetch failed: ${e.message}`);
            }

            console.log(`      ✗ No valid content found at ${basePath}`);
            return [];
        }

        async function generateWeeksHTML() {
            const container = document.getElementById('weeksContainer');
            
            for (const [week, folders] of Object.entries(submissions)) {
                const weekDiv = document.createElement('div');
                weekDiv.className = 'week';
                
                const weekTitle = document.createElement('div');
                weekTitle.className = 'week-title';
                weekTitle.textContent = week;
                
                const assignmentsDiv = document.createElement('div');
                assignmentsDiv.className = 'assignments';
                
                for (const folder of folders) {
                    // Determine week folder name
                    const weekFolder = week.toLowerCase().replace(' ', '');
                    const dateLabel = dateMap[folder];
                    
                    // Create a wrapper for assignment and its examples
                    const assignmentGroup = document.createElement('div');
                    assignmentGroup.className = 'assignment-group';
                    
                    const assignment = document.createElement('div');
                    assignment.className = 'assignment';
                    
                    const dateSpan = document.createElement('div');
                    dateSpan.className = 'date';
                    dateSpan.textContent = dateLabel;
                    assignment.appendChild(dateSpan);
                    
                    const viewLink = document.createElement('a');
                    viewLink.href = `${weekFolder}/${folder}/code_deliverable/`;
                    viewLink.className = 'view-link';
                    viewLink.textContent = 'View Submission';

                    const submissionRow = document.createElement('div');
                    submissionRow.className = 'submission-row';
                    submissionRow.appendChild(viewLink);

                    assignment.appendChild(submissionRow);

                    assignment.addEventListener('click', () => {
                        window.location.href = viewLink.href;
                    });
                    
                    assignmentGroup.appendChild(assignment);
                    
                    const examplesSection = document.createElement('div');
                    examplesSection.className = 'examples-section examples-collapsed';
                    examplesSection.id = `examples-${weekFolder}-${folder}`;
                    
                    // Load examples asynchronously
                    loadExamples(weekFolder, folder).then(examples => {
                        if (examples.length > 0) {
                        const examplesTitle = document.createElement('div');
                        examplesTitle.className = 'examples-title';
                        examplesTitle.textContent = 'Examples';
                        examplesSection.appendChild(examplesTitle);
                        
                        const examplesList = document.createElement('div');
                        examplesList.className = 'examples-list';
                        
                        examples.forEach((example) => {
                            const exampleLink = document.createElement('a');
                            exampleLink.href = example.path;
                            exampleLink.className = 'example-link-btn';
                            exampleLink.textContent = example.name;
                            
                            examplesList.appendChild(exampleLink);
                        });
                        
                        examplesSection.appendChild(examplesList);
                            const examplesToggle = document.createElement('button');
                            examplesToggle.type = 'button';
                            examplesToggle.className = 'examples-toggle';
                            examplesToggle.setAttribute('aria-label', 'Toggle examples');

                            const arrow = document.createElement('span');
                            arrow.className = 'arrow';
                            arrow.textContent = '▾';

                            const toggleText = document.createElement('span');
                            toggleText.textContent = 'Show examples';

                            examplesToggle.appendChild(arrow);
                            examplesToggle.appendChild(toggleText);
                            assignment.appendChild(examplesToggle);

                            examplesToggle.addEventListener('click', (event) => {
                                event.preventDefault();
                                event.stopPropagation();
                                const isCollapsed = examplesSection.classList.toggle('examples-collapsed');
                                assignmentGroup.classList.toggle('examples-open', !isCollapsed);
                                examplesToggle.classList.toggle('is-open', !isCollapsed);
                                toggleText.textContent = isCollapsed ? 'Show examples' : 'Hide examples';
                            });
                        }
                    });
                    
                    assignmentGroup.appendChild(examplesSection);
                    assignmentsDiv.appendChild(assignmentGroup);
                }
                
                weekDiv.appendChild(weekTitle);
                weekDiv.appendChild(assignmentsDiv);
                container.appendChild(weekDiv);
            }
        }

        loadStudentName();
        console.log('🚀 Starting to generate weeks HTML...');
        generateWeeksHTML();
    </script>
</body>
</html>
